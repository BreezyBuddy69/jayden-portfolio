name: Publish Docker image to GHCR

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

      - name: Deploy to VPS
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/jayden-portfolio || mkdir -p /opt/jayden-portfolio && cd /opt/jayden-portfolio
            cat > docker-compose.yml << 'EOF'
            services:
              app:
                image: ghcr.io/breezybuddy69/jayden-portfolio:main
                container_name: jayden-portfolio-app
                restart: unless-stopped
                networks:
                  - traefik-proxy
                labels:
                  - "traefik.enable=true"
                  - "traefik.docker.network=traefik-proxy"
                  - "traefik.http.routers.jayden-portfolio.rule=Host(`jayden-mikus.halovisionai.cloud`)"
                  - "traefik.http.routers.jayden-portfolio.entrypoints=websecure"
                  - "traefik.http.routers.jayden-portfolio.tls=true"
                  - "traefik.http.routers.jayden-portfolio.tls.certresolver=letsencrypt"
                  - "traefik.http.services.jayden-portfolio.loadbalancer.server.port=80"
            networks:
              traefik-proxy:
                external: true
            EOF
            docker pull ghcr.io/breezybuddy69/jayden-portfolio:main
            docker compose down --remove-orphans
            docker compose up -d
            docker compose logs --tail=20
