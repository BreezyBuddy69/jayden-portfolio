services:
  app:
    image: ghcr.io/breezybuddy69/jayden-portfolio:main
    container_name: jayden-portfolio-app
    restart: unless-stopped
    networks:
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.jayden-portfolio.rule=Host(`jayden-mikus.halovisionai.cloud`)"
      - "traefik.http.routers.jayden-portfolio.entrypoints=websecure"
      - "traefik.http.routers.jayden-portfolio.tls=true"
      - "traefik.http.routers.jayden-portfolio.tls.certresolver=letsencrypt"
      - "traefik.http.services.jayden-portfolio.loadbalancer.server.port=80"
      # Rate limiting: max 60 requests/min per IP, burst up to 20
      - "traefik.http.middlewares.portfolio-rl.ratelimit.average=60"
      - "traefik.http.middlewares.portfolio-rl.ratelimit.burst=20"
      - "traefik.http.middlewares.portfolio-rl.ratelimit.period=1m"
      - "traefik.http.routers.jayden-portfolio.middlewares=portfolio-rl@docker"

networks:
  traefik-proxy:
    external: true
